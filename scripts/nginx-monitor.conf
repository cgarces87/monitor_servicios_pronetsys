# ============================================================================
#  Nginx — monitor.pronetsys.com.co   (PLANTILLA DE ARRANQUE — solo HTTP/:80)
# ----------------------------------------------------------------------------
#  Sirve el build estatico del frontend (Vite) y reverse-proxy de /api hacia
#  el motor Node (Fastify en 127.0.0.1:3000).
#
#  !!! IMPORTANTE !!!
#  En el VPS YA se ejecuto `certbot --nginx`, que MODIFICO el archivo
#  desplegado en /etc/nginx/sites-available/ para agregar el listen 443 ssl,
#  los certificados y el redirect HTTP->HTTPS. Este archivo del repo es solo
#  la plantilla de arranque (HTTP). NO vuelvas a copiarlo sobre el desplegado
#  o borraras la config HTTPS de certbot (tendrias que re-ejecutar certbot).
#
#  Instalacion inicial (solo la primera vez, antes de certbot):
#     cp scripts/nginx-monitor.conf /etc/nginx/sites-available/monitor.pronetsys.com.co
#     ln -s /etc/nginx/sites-available/monitor.pronetsys.com.co /etc/nginx/sites-enabled/
#     nginx -t && systemctl reload nginx
#     certbot --nginx -d monitor.pronetsys.com.co
# ============================================================================

server {
    # default_server: este bloque tambien atiende peticiones por IP directa
    # (Host que no coincide con ningun server_name). Requiere que NO exista
    # otro 'default_server' en el puerto 80 -> borrar /etc/nginx/sites-enabled/default.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name monitor.pronetsys.com.co _;

    # Raiz: build de Vite
    root /opt/monitor_servicios_pronetsys/frontend/dist;
    index index.html;

    access_log /var/log/nginx/monitor.access.log;
    error_log  /var/log/nginx/monitor.error.log;

    # API -> motor Node (Fastify)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache agresivo de assets con hash de Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
